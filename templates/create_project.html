<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Создание проекта</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --soft: #f3f4f6;
      --accent: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .shell {
      width: 100%;
      max-width: 980px;
      display: grid;
      gap: 18px;
    }

    .topbar,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.02);
    }

    .topbar {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .back-btn {
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s ease;
      white-space: nowrap;
    }

    .back-btn:hover {
      background: #e5e7eb;
    }

    .panel {
      padding: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      font: inherit;
      padding: 14px 14px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      border-color: #cbd5e1;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.04);
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.5;
    }

    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position:
        calc(100% - 22px) calc(50% - 3px),
        calc(100% - 16px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 42px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 2px;
    }

    .checkbox-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .checkbox-row span {
      font-size: 14px;
      color: var(--text);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .secondary-btn,
    .primary-btn {
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s ease;
      border: 1px solid var(--line);
      white-space: nowrap;
    }

    .secondary-btn {
      background: #fff;
      color: var(--text);
    }

    .secondary-btn:hover {
      background: var(--soft);
    }

    .primary-btn {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .primary-btn:hover {
      opacity: 0.92;
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .page {
        padding: 14px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: stretch;
      }

      .secondary-btn,
      .primary-btn {
        flex: 1 1 180px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <header class="topbar">
        <div class="title-wrap">
          <span class="eyebrow">Проекты</span>
          <h1>Создание проекта</h1>
        </div>
        <button class="back-btn" type="button">Назад</button>
      </header>

      <section class="panel">
        <form action="/project/create" method="POST">
          <div class="form-grid">
            <div class="field full">
              <label for="title">Название</label>
              <input id="title" name="title" type="text" placeholder="Введите название проекта" />
            </div>

            <div class="field full">
              <label for="description">Описание</label>
              <textarea id="description" name="description" placeholder="Коротко опишите цель, особенности и ожидаемый результат"></textarea>
            </div>

            <div class="field">
              <label for="model">Модель</label>
              <select id="model" name="model">
                <option value="">Выберите модель</option>
                {% for m in models %}
                  <option value="{{ m.id }}">{{ m.title }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="field">
              <label>Видимость</label>
              <div class="checkbox-row">
                <input id="public" name="is_private" value="true" type="checkbox" />
                <span>Сделать проект приватным</span>
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="secondary-btn" type="button">Отмена</button>
            <button class="primary-btn" type="submit">Создать проект</button>
          </div>
        </form>
      </section>
    </div>
  </main>
</body>
</html>
