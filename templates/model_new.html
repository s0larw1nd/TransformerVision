<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Модель ML</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #f5f6f7;
      --panel-2: #eef1f4;
      --line: #d7dbe0;
      --text: #111111;
      --muted: #666666;
      --soft: rgba(0, 0, 0, 0.08);
      --soft2: rgba(0, 0, 0, 0.16);
      --accent: #000000;
      --active: #000000;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, #fbfbfc 100%);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr 28rem;
      gap: 0;
    }

    .topbar, .subbar, .bottom {
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .title {
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 15px;
    }

    .save-btn {
      border: 1px solid #000;
      background: #000;
      color: #fff;
      border-radius: 999px;
      height: 34px;
      padding: 0 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .subbar {
      padding: 12px 18px;
      background: linear-gradient(180deg, #fff 0%, #fafafa 100%);
    }

    .subbar-inner {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .prompt-wrap {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .prompt-input {
      width: 100%;
      min-width: 220px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 14px;
      outline: none;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }

    .prompt-input::placeholder { color: #888; }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
      user-select: none;
      white-space: nowrap;
    }

    .switch {
      position: relative;
      width: 52px;
      height: 28px;
      border-radius: 999px;
      background: #111;
      border: 1px solid #111;
      padding: 2px;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .knob {
      position: absolute;
      left: 2px;
      top: 2px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.18s ease;
    }

    .switch[data-mode="features"] .knob {
      transform: translateX(24px);
    }

    .mode-label {
      font-weight: 600;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(247,248,250,0.8), rgba(250,251,252,0.92)),
        repeating-linear-gradient(90deg, transparent 0 60px, rgba(0,0,0,0.02) 60px 61px),
        repeating-linear-gradient(0deg, transparent 0 32px, rgba(0,0,0,0.025) 32px 33px);
    }

    .model-shell {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 10px 12px 0 12px;
    }

    .model-frame {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 0;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(237,240,244,0.6), rgba(255,255,255,0.1));
    }

    .model-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .tooltip {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-9999px, -9999px);
      pointer-events: none;
      background: rgba(255,255,255,0.98);
      border: 1px solid rgba(0,0,0,0.14);
      box-shadow: var(--shadow);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      color: #111;
      max-width: 220px;
      line-height: 1.35;
      z-index: 15;
      white-space: nowrap;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr 1fr 2fr;
      min-height: 0;
      background: #fff;
    }

    .panel {
      min-width: 0;
      border-right: 1px solid var(--line);
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 0;
      background: linear-gradient(180deg, #fff, #fafafa);
    }

    .panel:last-child { border-right: 0; }

    .panel-head {
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-body {
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }

    .panel-submenu {
      border-top: 1px solid var(--line);
      background: #fbfbfb;
      padding: 12px;
      min-height: 120px;
    }

    .stack {
      display: grid;
      gap: 8px;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 0 12px;
      cursor: pointer;
      font-size: 13px;
    }

    .cell:hover { border-color: #000; }

    .cell .x {
      width: 26px;
      height: 26px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 700;
      background: #fff;
      flex: 0 0 auto;
    }

    .cell.muted {
      color: #555;
      background: #fcfcfc;
      border-style: dashed;
    }

    .field-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
      max-height: 100%;
      overflow-y: auto;
    }

    .field {
      display: grid;
      gap: 6px;
      font-size: 12px;
      color: #444;
    }

    .field input, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
      color: #111;
      resize: vertical;
      min-height: 40px;
    }

    .field textarea[readonly], .field input[readonly] {
      background: #f7f7f7;
      color: #222;
    }

    .result-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .result-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      min-height: 120px;
      padding: 12px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .result-card iframe {
      width: 100%;
      min-height: 180px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .result-empty {
      min-height: 100%;
      border: 1px dashed var(--line);
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #777;
      font-size: 13px;
      background: linear-gradient(180deg, #fff, #fafafa);
    }

    .mini-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 8px;
    }

    .btn-link {
      border: 1px solid var(--line);
      background: #fff;
      color: #111;
      border-radius: 10px;
      height: 34px;
      padding: 0 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-link:hover { border-color: #000; }

    .selected {
      box-shadow: inset 0 0 0 2px #000;
    }

    .top-note {
      position: absolute;
      right: 14px;
      top: 14px;
      font-size: 12px;
      color: #666;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      padding: 6px 10px;
      z-index: 2;
    }

    @media (max-width: 1100px) {
      .bottom { grid-template-columns: 1fr; }
      .panel { border-right: 0; border-bottom: 1px solid var(--line); }
      .panel:last-child { border-bottom: 0; }
      .app { grid-template-rows: auto auto minmax(36rem, 1fr) auto; }
    }
  </style>

  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title">Модель ML</div>
      <button class="save-btn" id="saveBtn">Сохранить</button>
    </header>

    <section class="subbar">
      <div class="subbar-inner">
        <div class="prompt-wrap">
          <input id="promptField" class="prompt-input" placeholder="Введите промпт для модели..." value="Hello World" />
        </div>
        <div class="toggle" title="Переключение режима визуализации">
          <span class="mode-label" id="modeLabel">Головы внимания</span>
          <div class="switch" id="modeSwitch" data-mode="attention" role="switch" aria-checked="false" tabindex="0">
            <div class="knob"></div>
          </div>
          <span class="mode-label">Структура</span>
        </div>
      </div>
    </section>

    <main class="main">
      <div class="model-shell">
        <div class="model-frame" id="modelFrame">
          <svg class="model-svg" id="modelSvg" aria-label="Визуализация модели" preserveAspectRatio="none"></svg>
          <div class="tooltip" id="tooltip"></div>
        </div>
      </div>
    </main>

    <section class="bottom">
      <aside class="panel" id="historyPanel">
        <div class="panel-head">
          <span>История операций</span>
          <button class="btn-link" id="clearHistoryBtn">Очистить</button>
        </div>
        <div class="panel-body" id="historyMain">
          <div class="stack" id="historyList"></div>
        </div>
        <div class="panel-submenu" id="historySubmenu" style="display: None">
          <div class="mini-title">Детали операции</div>
          <div class="field-grid" id="historyFields"></div>
        </div>
      </aside>

      <aside class="panel" id="toolsPanel">
        <div class="panel-head">
          <span>Список инструментов</span>
        </div>
        <div class="panel-body" id="toolsMain">
          <div class="stack" id="toolsList">
            <div class="cell" onclick="renderToolFields('actmap')">
              Карта активаций
            </div>
            <div class="cell" onclick="renderToolFields('ablation')">
              Аблация
            </div>
            <div class="cell" onclick="renderToolFields('logattr')">
              Атрибуция логитов
            </div>
            <div class="cell" onclick="renderToolFields('loglens')">
              Логитные линзы
            </div>
            <div class="cell" onclick="renderToolFields('actpatch')">
              Патчинг активаций
            </div>
            <div class="cell" onclick="renderToolFields('linprob')">
              Линейное пробирование
            </div>
          </div>
        </div>
        <div class="panel-submenu" id="toolsSubmenu" style="display: None">
          <div class="mini-title" id="toolsSubmenu-mini-title">Параметры инструмента</div>
          <div class="field-grid" id="toolsFields"></div>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-head">
          <span>Область результатов</span>
        </div>
        <div class="panel-body" id="resultsArea">
          <div class="result-empty" id="result-empty">Место для отображения результатов операций</div>
          <div id="result-card" style="display: none;"></div>
          <iframe id="result-iframe" style="display: none; width: 100%; height: 500px;" srcdoc='<!DOCTYPE html><html lang="ru"><body style="margin:0;font-family:system-ui;background:#fff;display:flex;align-items:center;justify-content:center;height:100%;color:#6b7280;"><div></div></body></html>'></iframe>
          <div id="result-preview" style="height: 500px; display: none;"></div>
        </div>
      </section>
    </section>
  </div>

  <script>
    const svg = document.getElementById('modelSvg');
    const frame = document.getElementById('modelFrame');
    const tooltip = document.getElementById('tooltip');
    const modeSwitch = document.getElementById('modeSwitch');
    const modeLabel = document.getElementById('modeLabel');
    const toolsList = document.getElementById('toolsList');
    const historyList = document.getElementById('historyList');
    const toolsFields = document.getElementById('toolsFields');
    const historyFields = document.getElementById('historyFields');
    const resultsArea = document.getElementById('resultsArea');
    const promptField = document.getElementById('promptField');
    var chosen = null;

    modeSwitch.onclick = toggleMode;

    const state = {
      mode: 'attention',
      selectedToken: null,
      selectedNode: null,
      nodes: [],
      matrices: [],
      history: [],
      toolIndex: 0,
    };

    function setMode(nextMode) {
      window.location.href = window.location.href + "/struct";
    }

    function toggleMode() {
      setMode(state.mode === 'attention' ? 'struct' : 'attention');
    }

    var MODEL = null;

    async function getMatrix() {
      const resp = await fetch(`http://127.0.0.1:80/composition`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
      },
        body: JSON.stringify({
          method: "composition",
          model_id: {{ model.id }},
          config: JSON.stringify({ prompt: promptField.value })
        })
      });

      const job = await resp.json();

      const data = await new Promise((resolve, reject) => {
        const source = new EventSource(
          `/composition/${job.cid}`
        );

        source.onmessage = (event) => {
          const temp = JSON.parse(event.data);
          source.close();
          resolve(temp);
        };

        source.onerror = (err) => {
          console.log(err);
          source.close();
          reject(err);
        };
      });

      var matrix = await loadMatrix(job.cid, data);

      return matrix;
    }

    function nodeId(token, level, head) {
      return `${token}_${level}_${head}`;
    }

    function nodeFromId(tstr) {
      const t = tstr.split("_");
      return t[0], t[1], t[2]
    }

    async function loadMatrix(task_id, data){
      const r = await fetch(`http://127.0.0.1:80/composition/${task_id}/data`);
      const buffer = await r.arrayBuffer();
      const view = new DataView(buffer);

      let offset = 0;
      const n = view.getInt32(offset, true);
      offset += 4;

      const nnz = view.getInt32(offset, true);
      offset += 4;

      const crow = new Int32Array(
        buffer,
        offset,
        n + 1
      );

      offset += (n + 1) * 4;

      const col = new Int32Array(
        buffer,
        offset,
        nnz
      );

      offset += nnz * 4;

      const values = new Float32Array(
        buffer,
        offset,
        nnz
      );

      matrix = {
          n,
          crow,
          col,
          values,
      };
      matrix.tokens_n = data.tokens_n;
      matrix.layers_n = data.layers_n;
      matrix.heads_n = data.heads_n;
      matrix.tokens = data.tokens;

      return matrix;
    }

    function flatten(token, layer, head, layers, heads) {
      return token * layers * heads
        + layer * heads
        + head;
    }

    function getAttention(
      matrix,
      token1,
      layer1,
      head1,
      token2,
      layer2,
      head2
    ){
      const row = flatten(
        token1,
        layer1,
        head1,
        matrix.layers_n,
        matrix.heads_n
      );

      const colTarget = flatten(
        token2,
        layer2,
        head2,
        matrix.layers_n,
        matrix.heads_n
      );

      const start = Number(matrix.crow[row]);
      const end = Number(matrix.crow[row+1]);

      for(let k=start;k<end;k++){
        if(Number(matrix.col[k]) === colTarget)
          return matrix.values[k];
      }

      return 0;
    }

    async function drawModel() {
      if (!MODEL) {
        var matrix = await getMatrix();
        MODEL = matrix;
      }
      const w = frame.clientWidth;
      const h = frame.clientHeight;

      svg.innerHTML = "";

      const tokenWidth = w / MODEL.tokens.length;

      const top = 70;
      const bottom = 40;

      const levelsHeight = (h - top - bottom) / (MODEL.layers_n + 2);

      const nodes = {};
      let html = "";

      MODEL.tokens.forEach((token,t)=>{
        const x0 = t * tokenWidth;
          
        if(t>0){
          html += `
          <line
            x1="${x0}"
            y1="0"
            x2="${x0}"
            y2="${h}"
            stroke="rgba(0,0,0,.15)"
          />
          `;
        }

        html += `
        <text
        x="${x0+tokenWidth/2}"
        y="25"
        text-anchor="middle"
        font-size="13">
          ${token}
        </text>
        `;

        const embedY = top;

        nodes[nodeId(token,-1,0)] = {
          x:x0+tokenWidth/2,
          y:embedY
        };

        html += square(
          x0+tokenWidth/2,
          embedY,
          12,
          t===state.selectedToken
        );
        
        for(let l=0;l<MODEL.layers_n;l++){
          const y = top + levelsHeight*(l+1);

          for(let head=0;head<MODEL.heads_n;head++){
            const offset = (head - MODEL.heads_n/2) * 12;
            const x = x0+ tokenWidth/2+ offset;
            nodes[nodeId(t,l,head)]={
              x,
              y,
              token:t,
              level:l,
              head
            };

            html += circle(x,y,5,t,l,head,nodeId(t,l,head)==chosen);
          }
        }

        const probY = top + levelsHeight * (MODEL.layers_n+1);

        nodes[nodeId(token,MODEL.layers_n,0)]={
          x:x0+tokenWidth/2,
          y:probY
        };

        html += square(
          x0+tokenWidth/2,
          probY,
          12,
          t===state.selectedToken
        );
      });

      var k = 0;

      const T = MODEL.tokens_n;
      const L = MODEL.layers_n;
      const H = MODEL.heads_n;

      var html_nodes = '';
      var html_chosen = '';

      for (let token1 = 0; token1 < T; token1++) {
        for (let token2 = token1; token2 < T; token2++) {
          for (let layer1 = 0; layer1 < L; layer1++) {
            for (let layer2 = layer1; layer2 < L; layer2++) {
              for (let head1 = 0; head1 < H; head1++) {
                for (let head2 = head1; head2 < H; head2++) {
                  const value = getAttention(
                    MODEL,
                    token1, layer1, head1,
                    token2, layer2, head2
                  );

                  if (value == 0) continue;

                  const id1 = nodeId(token1, layer1, head1);
                  const id2 = nodeId(token2, layer2, head2);
                  const a = nodes[id1];
                  const b = nodes[id2];

                  if (!a || !b) continue;

                  if (chosen === null) {
                    html_nodes =
                    `<line
                      x1="${a.x}"
                      y1="${a.y}"
                      x2="${b.x}"
                      y2="${b.y}"
                      stroke="LightGray"
                      opacity="0.3"
                      stroke-width="1"
                    />` + html_nodes;
                  }
                  else if ([id1, id2].includes(chosen)) {
                    html_chosen = 
                    `<line
                      x1="${a.x}"
                      y1="${a.y}"
                      x2="${b.x}"
                      y2="${b.y}"
                      stroke="Black"
                      opacity="1"
                      stroke-width="1"
                    />` + html_chosen;
                  }
                  else {
                    html_nodes = 
                    `<line
                      x1="${a.x}"
                      y1="${a.y}"
                      x2="${b.x}"
                      y2="${b.y}"
                      stroke="LightGray"
                      opacity="0.1"
                      stroke-width="1"
                    />` + html_nodes;
                  }

                  k += 1;
                }
              }
            }
          }
        }
      }

      html = html_nodes + html_chosen + html

      svg.innerHTML = html;
      bindNodeEvents();
    }

    promptField.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        MODEL = null;
        drawModel();
      }
    }); 

    function circle(x,y,r,token_idx,level_idx,head_idx,chosen){
      return `
      <circle
      cx="${x}"
      cy="${y}"
      r="${r}"
      fill="${chosen ? "black" : "white"}"
      stroke="black"
      class="node"
      data-token=${token_idx}
      data-level=${level_idx}
      data-idx=${head_idx}
      />
      `;
    }

    function square(x,y,s,selected=false){
      return `
      <rect
      x="${x-s/2}"
      y="${y-s/2}"
      width="${s}"
      height="${s}"
      fill="white"
      stroke="black"
      stroke-width="${selected?3:1}"
      class="node"
      />
      `;
    }

    function bindNodeEvents() {
      svg.querySelectorAll('.node').forEach(el => {
        el.addEventListener('mouseenter', (e) => {
          var x = 0;
          var y = 0;
          var info = "";
          if (el.tagName == "circle") {
            x = Number(el.cx.baseVal.value);
            y = Number(el.cy.baseVal.value);
            info = `
            слой: ${el.getAttribute("data-level")}<br>
            узел: ${el.getAttribute("data-idx")}<br>
            `;
          }
          else if (el.tagName == "rect") {
            x = Number(el.x.baseVal.value);
            y = Number(el.y.baseVal.value);
            info = `
            `;
          }
          tooltip.innerHTML = info;
          const rect = frame.getBoundingClientRect();
          const left = x + 14;
          const top = y - 6;
          tooltip.style.transform = `translate(${Math.min(left, rect.width - 240)}px, ${Math.max(8, top)}px)`;
        });
        el.addEventListener('mouseleave', () => {
          tooltip.style.transform = 'translate(-9999px, -9999px)';
        });
        el.addEventListener('click', () => {
          if (chosen != nodeId(el.getAttribute("data-token"),el.getAttribute("data-level"),el.getAttribute("data-idx"))) {
            chosen = nodeId(el.getAttribute("data-token"),el.getAttribute("data-level"),el.getAttribute("data-idx"));
          }
          else {
            chosen = null;
          }
          drawModel();
        });
      });
    }

    function renderToolFields(tool) {
      toolsFields.innerHTML = '';
      var fields = null;
      var func = null;
      switch (tool) {
        case 'actmap':
          fields = {
            names: ["Номер слоя", "Головы внимания"],
            types: ["text", "text"]
          };
          func = actmap;
          break;
        case 'ablation':
          fields = {
            names: ["Номер слоя", "Головы внимания"],
            types: ["text", "text"]
          };
          func = ablation;
          break;
        case 'logattr':
          fields = {
            names: ["Номер слоя", "Головы внимания"],
            types: ["text", "text"]
          };
          func = logattr;
          break;
        case 'loglens':
          fields = {
            names: ["Номер слоя"],
            types: ["text"]
          };
          func = loglens;
          break;
        case 'actpatch':
          fields = {
            names: ["Корректный промпт", "Некорректный промпт", "Корректный прогноз", "Номер слоя", "Головы внимания"],
            types: ["text", "text", "text", "text", "text"]
          };
          func = actpatch;
          break;
        case 'linprob':
          fields = {
            names: ["Номер слоя", "Промпты", "Слова"],
            types: ["text", "file", "file"]
          };
          func = linprob;
          break;
      }
      for (const [i, name] of fields.names.entries()) {
        const type = fields.types[i];
        const wrap = document.createElement('div');
        wrap.className = 'field';
        if (type == "text") wrap.innerHTML = `<label>${name}</label><input type="text" />`;
        else if (type == "file") wrap.innerHTML = `<label>${name}</label><input type="file" accept=".txt" />`;
        toolsFields.appendChild(wrap);
      }

      const btnStart = document.createElement('button');
      btnStart.className = 'btn-link';
      btnStart.innerHTML = `Старт`;
      btnStart.id = 'btnStart';
      btnStart.onclick = function () { func(); };
      toolsFields.appendChild(btnStart);

      const btnCancel = document.createElement('button');
      btnCancel.className = 'btn-link';
      btnCancel.innerHTML = `Отмена`;
      btnCancel.addEventListener('click', (e) => {
        document.getElementById("toolsSubmenu").style.display = 'none';
        document.getElementById("toolsMain").style.display = 'block';
      });
      toolsFields.appendChild(btnCancel);

      document.getElementById("toolsSubmenu").style.display = 'block';
      document.getElementById("toolsMain").style.display = 'none';
      document.getElementById("toolsSubmenu-mini-title").innerHTML = `Параметры инструмента "${translate(tool)}"`;
    }

    function renderHistory() {
      historyList.innerHTML = '';
      if (!state.history.length) {
        const empty = document.createElement('div');
        empty.className = 'cell muted';
        empty.textContent = 'История пуста';
        historyList.appendChild(empty);
      } else {
        state.history.forEach((item, index) => {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.innerHTML = `<span>${translate(item.method_name)}</span><span class="x" data-remove="${item.id}">X</span>`;
          cell.addEventListener('click', (e) => {
            if (e.target && e.target.dataset.remove !== undefined) return;
            renderHistoryFields(item);
          });
          cell.querySelector('.x').addEventListener('click', (e) => {
            e.stopPropagation();
            deleteHistory(item.id);
          });
          historyList.appendChild(cell);
        });
      }
    }

    async function deleteHistory(id) {
      const resp = await fetch(`http://127.0.0.1:80/history/${id}/delete`, { method: "DELETE" });
      await get_history();
    }

    async function clearHistory() {
      state.history.forEach(async (item, _) => {
        await fetch(`http://127.0.0.1:80/history/${item.id}/delete`, { method: "DELETE" });
      });
      state.history = [];
      renderHistory();
    }

    function renderHistoryFields(item) {
      historyFields.innerHTML = '';
      const fields = JSON.parse(item.config);
      for (const [key, value] of Object.entries(fields)) {
        const wrap = document.createElement('div');
        wrap.className = 'field';
        wrap.innerHTML = `<label>${translate(key)}</label><textarea readonly>${value}</textarea>`;
        historyFields.appendChild(wrap);
      }
      
      const btnStart = document.createElement('button');
      btnStart.className = 'btn-link';
      btnStart.innerHTML = `Старт`;
      btnStart.onclick = function () { from_history(item.id); };
      historyFields.appendChild(btnStart);

      const btnCancel = document.createElement('button');
      btnCancel.className = 'btn-link';
      btnCancel.innerHTML = `Отмена`;
      btnCancel.addEventListener('click', (e) => {
        document.getElementById("historySubmenu").style.display = 'none';
        document.getElementById("historyMain").style.display = 'block';
      });
      historyFields.appendChild(btnCancel);

      document.getElementById("historySubmenu").style.display = 'block';
      document.getElementById("historyMain").style.display = 'none';
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      history.back();
    });

    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
      clearHistory();
    });

    function translate(method_name) {
      switch (method_name) {
        case 'ablation': return 'Аблация';
        case 'actmap': return 'Карта активаций';
        case 'logattr': return 'Атрибуция логитов';
        case 'loglens': return 'Логитные линзы';
        case 'actpatch': return 'Патчинг активаций';
        case 'linprob': return 'Линейное пробирование';
        
        case 'head_n': return 'Головы внимания';
        case 'layer_n': return 'Слои';
        case 'prompt': return 'Промпт';

        default: return method_name;
      }
    }

    async function get_data(
      body
    ) {
      const resp = await fetch(`http://127.0.0.1:80/method`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
      },
        body: body
      });

      const job = await resp.json();

      const data = await new Promise((resolve, reject) => {
        const source = new EventSource(
          `/results/${job.cid}`
        );

        source.onmessage = (event) => {
          const temp = JSON.parse(event.data);
          source.close();
          resolve(temp);
        };

        source.onerror = (err) => {
          console.log(err);
          source.close();
          reject(err);
        };
      });

      if (Object.keys(data).length == 0) { throw "ERROR"; }
      return data;
    }

    function clearSpace() {
      document.getElementById("result-card").innerHTML = '';
      document.getElementById("result-preview").innerHTML = '';
      document.getElementById("result-iframe").srcdoc = '';

      document.getElementById("result-card").style.display = 'none';
      document.getElementById("result-preview").style.display = 'none';
      document.getElementById("result-iframe").style.display = 'none';
    }

    async function ablation(data = null) {
      var heads = null;
      if (data == null) {
        const target = document.getElementById("btnStart");
        
        const items = Array.from(target.parentElement.children);
        const index = items.indexOf(target);

        const layer = parseInt(items[index - 2].lastChild.value);
        heads = items[index - 1].lastChild.value
        .split(',')
        .map(s => Number(s.trim()));

        data = await get_data(
          JSON.stringify({
            method: "ablation",
            cell_id: {{ cell.id }},
            seq_no: 1,
            model_id: {{ model.id }},
            config: JSON.stringify({ head_n: heads, layer_n: layer, prompt: promptField.value })
          })
        );
      }
      else {
        const config = JSON.parse(data.method.config);
        heads = config.head_n;
      };

      fig = JSON.parse(data.fig);

      clearSpace();
      document.getElementById("result-empty").style.display = 'none';
      document.getElementById("result-card").style.display = 'block';
      var res = '<p>Изменения функции потерь:<\p>'
      heads.forEach((head, index) => {
        res += `<p>Г.В. ${head}: ${data.scores[index]}<\p>`
      });
      
      document.getElementById("result-card").innerHTML = res;
      document.getElementById("result-preview").style.display = 'block';
      Plotly.newPlot("result-preview", fig.data, fig.layout);

      get_history();
    }

    async function actmap(data = null) {
      var heads = null;
      if (data == null) {
        const target = document.getElementById("btnStart");
        
        const items = Array.from(target.parentElement.children);
        const index = items.indexOf(target);

        const layer = parseInt(items[index - 2].lastChild.value);
        heads = items[index - 1].lastChild.value
        .split(',')
        .map(s => Number(s.trim()));

        data = await get_data(
          JSON.stringify({
            method: "actmap",
            cell_id: {{ cell.id }},
            seq_no: 1,
            model_id: {{ model.id }},
            config: JSON.stringify({ head_n: heads, layer_n: layer, prompt: promptField.value })
          })
        );
      };

      clearSpace();
      document.getElementById("result-empty").style.display = 'none';
      document.getElementById("result-card").style.display = 'block';
      var res = `<p>Паттерны:<\p>
        <p>Текущий токен: ${(data.current.length!=0) ? data.current.toString() : 'Не найдены'}<\p>
        <p>Предыдущий токен: ${(data.prev.length!=0) ? data.prev.toString() : 'Не найдены'}<\p>
        <p>Первый токен: ${(data.first.length!=0) ? data.first.toString() : 'Не найдены'}<\p>
        <p>Индукция: ${(data.induction.length!=0) ? data.induction.toString() : 'Не найдены'}<\p>
        `;
      document.getElementById("result-card").innerHTML = res;

      document.getElementById("result-iframe").style.display = 'block';
      document.getElementById("result-iframe").srcdoc = data.fig;

      get_history();
    }

    async function logattr(data = null) {
      var heads = null;
      if (data == null) {
        const target = document.getElementById("btnStart");
        
        const items = Array.from(target.parentElement.children);
        const index = items.indexOf(target);

        const layer = parseInt(items[index - 2].lastChild.value);
        heads = items[index - 1].lastChild.value

        .map(s => Number(s.trim()));

        data = await get_data(
          JSON.stringify({

            config: JSON.stringify({ head_n: heads, layer_n: layer, prompt: promptField.value })

        );

      fig = JSON.parse(data.fig);

      clearSpace();
      document.getElementById("result-empty").style.display = 'none';
      document.getElementById("result-preview").style.display = 'block';
      Plotly.newPlot("result-preview", fig.data, fig.layout);

      get_history();
    }

    async function loglens(data = null) {
      if (data == null) {
        const target = document.getElementById("btnStart");
        
        const items = Array.from(target.parentElement.children);
        const index = items.indexOf(target);

        const layer = parseInt(items[index - 1].lastChild.value);

        data = await get_data(
          JSON.stringify({
            method: "loglens",
            cell_id: {{ cell.id }},
            seq_no: 1,
            model_id: {{ model.id }},
            config: JSON.stringify({ layer_n: layer, prompt: promptField.value })
          })
        );
      }
      
      fig = JSON.parse(data.fig);

      clearSpace();
      document.getElementById("result-empty").style.display = 'none';
      document.getElementById("result-preview").style.display = 'block';
      Plotly.newPlot("result-preview", fig.data, fig.layout);

      get_history();
    }

    async function actpatch(data = null) {
      var heads = null;
      if (data == null) {
        const target = document.getElementById("btnStart");
        
        const items = Array.from(target.parentElement.children);
        const index = items.indexOf(target);
        
        const correct_prompt = items[index - 5].lastChild.value;
        const corrupted_prompt = items[index - 4].lastChild.value;
        const answer = items[index - 3].lastChild.value;
        const layer = parseInt(items[index - 2].lastChild.value);
        heads = items[index - 1].lastChild.value
        .split(',')
        .map(s => Number(s.trim()));

        data = await get_data(
          JSON.stringify({
            method: "actpatch",
            cell_id: {{ cell.id }},
            seq_no: 1,
            model_id: {{ model.id }},
            config: JSON.stringify({ 
              head_n: heads, 
              layer_n: layer, 
              correct_prompt: correct_prompt,
              corrupted_prompt: corrupted_prompt,
              answer: answer
            })
          })
        );
      }
      
      fig = JSON.parse(data.fig);

      clearSpace();
      document.getElementById("result-empty").style.display = 'none';
      document.getElementById("result-card").style.display = 'block';
      var res = `Среднее изменение: ${data.diff}`;
      document.getElementById("result-card").innerHTML = res;

      document.getElementById("result-preview").style.display = 'block';
      Plotly.newPlot("result-preview", fig.data, fig.layout);

      get_history();
    }

    async function linprob(data = null) {
      if (data == null) {
        const target = document.getElementById("btnStart");
        
        const items = Array.from(target.parentElement.children);
        const index = items.indexOf(target);

        const layer = parseInt(items[index - 3].lastChild.value);
        const prompts = await items[index - 2].lastChild.files[0].text();
        const correct = await items[index - 1].lastChild.files[0].text();

        data = await get_data(
          JSON.stringify({
            method: "linprob",
            cell_id: {{ cell.id }},
            seq_no: 1,
            model_id: {{ model.id }},
            config: JSON.stringify({
              layer_n: layer,
              prompts: prompts,
              correct: correct
            })
          })
        );
      }

      clearSpace();
      var res = `F1 score: ${data.f1}`;
      document.getElementById("result-empty").style.display = 'none';
      document.getElementById("result-card").style.display = 'block';
      document.getElementById("result-card").innerHTML = res;
      get_history();
    }

    async function get_history() {
      const resp = await fetch(`http://127.0.0.1:80/history`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
      },
        body: JSON.stringify({
            cell_id: {{ cell.id }}
            })
      });

      data = await resp.json();
      state.history = data.history;
      renderHistory();
    }

    async function from_history(id) {
      const resp = await fetch(`http://127.0.0.1:80/history/${id}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ })
      });
      
      data = await resp.json();

      switch (data.method.method_name) {
        case 'ablation': ablation(data); break;
        case 'actmap': actmap(data); break;
        case 'logattr': logattr(data); break;
        case 'loglens': loglens(data); break;
        case 'actpatch': actpatch(data); break;
        case 'linprob': linprob(data); break;
      }
    }

    get_history();
    const ro = new ResizeObserver(() => drawModel());
    ro.observe(frame);
  </script>
