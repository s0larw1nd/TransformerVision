<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Эксперимент</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --soft: #f3f4f6;
      --accent: #111827;
      --good: #166534;
      --bad: #991b1b;
      --blue: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
    }

    .shell {
      width: 100%;
      max-width: 1440px;
      display: grid;
      gap: 18px;
    }

    .topbar,
    .panel,
    .cell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.02);
    }

    .topbar {
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-wrap {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1 1 520px;
    }

    .eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: 26px;
      letter-spacing: -0.03em;
    }

    .desc {
      max-width: 900px;
      line-height: 1.6;
      color: var(--text);
      font-size: 14px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--soft);
      font-size: 12px;
    }

    .status-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--good);
    }

    .status-pill.inactive .dot {
      background: var(--bad);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s ease;
      white-space: nowrap;
      background: #fff;
      color: var(--text);
    }

    .btn:hover { background: var(--soft); }

    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn.primary:hover { opacity: 0.92; }

    .btn.danger {
      background: #fff;
      color: var(--bad);
      border-color: #fecaca;
    }

    .btn.danger:hover { background: #fef2f2; }

    .panel {
      padding: 16px;
    }

    .notebook {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .insert-zone {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.22;
      transition: opacity 0.15s ease, height 0.15s ease;
      position: relative;
    }

    .insert-zone::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: transparent;
      border-top: 1px dashed #d1d5db;
      pointer-events: none;
    }

    .insert-zone:hover {
      opacity: 1;
      height: 44px;
    }

    .insert-actions {
      position: relative;
      z-index: 1;
      display: none;
      gap: 8px;
      padding: 0 10px;
      background: var(--bg);
      border-radius: 999px;
    }

    .insert-zone:hover .insert-actions {
      display: flex;
    }

    .insert-small {
      padding: 8px 10px;
      font-size: 13px;
      border-radius: 999px;
    }

    .cell {
      padding: 16px;
      border-radius: 18px;
      margin: 0;
    }

    .cell-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .cell-type {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .cell-type .marker {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
    }

    .cell-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cell-btn {
      padding: 9px 12px;
      border-radius: 11px;
      font-size: 13px;
    }

    .cell-content {
      line-height: 1.65;
      font-size: 14px;
      color: var(--text);
      white-space: pre-wrap;
    }

    .model-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      margin-bottom: 14px;
      width: fit-content;
    }

    .model-link:hover { opacity: 0.92; }

    .metrics {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--line);
      margin-top: 10px;
      background: #fff;
    }

    .metrics th,
    .metrics td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      vertical-align: top;
    }

    .metrics th {
      color: var(--muted);
      font-weight: 500;
      background: #fafafa;
      width: 220px;
    }

    .metrics tr:last-child th,
    .metrics tr:last-child td {
      border-bottom: none;
    }

    .empty-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
    }

    .model-cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 14px;
      }

      .panel,
      .cell {
        padding: 14px;
        border-radius: 16px;
      }

      .metrics th {
        width: 40%;
      }

      .insert-zone {
        opacity: 0.5;
      }

      .insert-zone:hover {
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <header class="topbar">
        <div class="title-wrap">
          <span class="eyebrow">Эксперименты</span>
          <h1>{{ experiment.title }}</h1>
          <div class="desc">
            {{ experiment.description }}
          </div>
          <div class="status-row">
            <span class="status-pill"><span class="dot"></span> Активный</span>
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" type="button">Завершить эксперимент</button>
          <button class="btn" type="button" onclick="back()">Назад</button>
          <button class="btn danger" type="button">Удалить эксперимент</button>
        </div>
      </header>

      <section class="panel">
        <div class="notebook">
          <div class="insert-zone" id="insert-zone-first">
            <div class="insert-actions">
              <button class="btn insert-small" type="button" onclick="insert_text_first()">+ Текстовая ячейка</button>
              <button class="btn insert-small" type="button" onclick="insert_model_first()">+ Модельная ячейка</button>
            </div>
          </div>
          
          {% for cell in cells %}
              {% if cell.type == 'TEXT' %}
                <article class="cell" id="cell-{{ cell.id }}" data-type="TEXT">
                  <div class="cell-header">
                    <span class="cell-type"><span class="marker"></span> Текстовая ячейка</span>
                    <div class="cell-actions">
                      <button class="btn cell-btn" type="button">Скрыть</button>
                      <button class="btn cell-btn danger" type="button">Удалить</button>
                    </div>
                  </div>
                  <div class="cell-content">
                    {{ cell.stext }}
                  </div>
                </article>
              {% elif cell.type == 'MODEL' %}
                <article class="cell" id="cell-{{ cell.id }}" data-type="MODEL">
                  <div class="cell-header">
                    <span class="cell-type"><span class="marker"></span> Модельная ячейка</span>
                    <div class="cell-actions">
                      <button class="btn cell-btn" type="button">Скрыть</button>
                      <button class="btn cell-btn danger" type="button">Удалить</button>
                    </div>
                  </div>

                  <div class="model-cell">
                    <a class="model-link" href="/model">Открыть UI работы с моделью</a>
                    <div class="empty-note">Метрики не добавлены</div>
                  </div>
                </article>
              {% endif %}

            <div class="insert-zone" id="insert-zone-{{ cell.id }}">
              <div class="insert-actions">
                <button class="btn insert-small" type="button" onclick="insert_text_after( {{ cell.id }} )">+ Текстовая ячейка</button>
                <button class="btn insert-small" type="button" onclick="insert_model_after( {{ cell.id }} )">+ Модельная ячейка</button>
              </div>
            </div>
          {% endfor %}

        </div>
      </section>
    </div>
  </main>

  <script>
    const data = {{ cells | tojson }};
    const maxId = data.length ? Math.max(...data.map(item => item.id)) : 0;
    var inc = 1;

    function back() {
      history.back();
    }

    function insert_text_first() {
      const current = document.getElementById(`insert-zone-first`);
      const newId = maxId + inc;
      inc += 1;

      const html = `
      <article class="cell" id="cell-${newId}" data-type="TEXT">
        <div class="cell-header">
          <span class="cell-type">
            <span class="marker"></span> Текстовая ячейка
          </span>
          <div class="cell-actions">
            <button class="btn cell-btn" type="button">Скрыть</button>
            <button class="btn cell-btn danger" type="button">Удалить</button>
          </div>
        </div>
        <div class="cell-content">
          Текст
        </div>
      </article>

      <div class="insert-zone" id="insert-zone-${newId}">
        <div class="insert-actions">
          <button class="btn insert-small" type="button" onclick="insert_text_after( ${newId} )">+ Текстовая ячейка</button>
          <button class="btn insert-small" type="button" onclick="insert_model_after( ${newId} )">+ Модельная ячейка</button>
        </div>
      </div>
      `;

      current.insertAdjacentHTML('afterend', html);
      syncCells();
    }
    function insert_model_first() {
      const current = document.getElementById(`insert-zone-first`);
      const newId = maxId + inc;
      inc += 1;

      const html = `
      <article class="cell" id="cell-${newId}" data-type="MODEL">
        <div class="cell-header">
          <span class="cell-type"><span class="marker"></span> Модельная ячейка</span>
          <div class="cell-actions">
            <button class="btn cell-btn" type="button">Скрыть</button>
            <button class="btn cell-btn danger" type="button">Удалить</button>
          </div>
        </div>

        <div class="model-cell">
          <a class="model-link" href="/model">Открыть UI работы с моделью</a>
          <div class="empty-note">Метрики не добавлены</div>
        </div>
      </article>

      <div class="insert-zone" id="insert-zone-${newId}">
        <div class="insert-actions">
          <button class="btn insert-small" type="button" onclick="insert_text_after( ${newId} )">+ Текстовая ячейка</button>
          <button class="btn insert-small" type="button" onclick="insert_model_after( ${newId} )">+ Модельная ячейка</button>
        </div>
      </div>
      `;

      current.insertAdjacentHTML('afterend', html);
      syncCells();
    }

    function insert_text_after(after) {
      const current = document.getElementById(`insert-zone-${after}`);
      const newId = maxId + inc;
      inc += 1;

      const html = `
      <article class="cell" id="cell-${newId}" data-type="TEXT">
        <div class="cell-header">
          <span class="cell-type">
            <span class="marker"></span> Текстовая ячейка
          </span>
          <div class="cell-actions">
            <button class="btn cell-btn" type="button">Скрыть</button>
            <button class="btn cell-btn danger" type="button">Удалить</button>
          </div>
        </div>
        <div class="cell-content">
          Текст
        </div>
      </article>

      <div class="insert-zone" id="insert-zone-${newId}">
        <div class="insert-actions">
          <button class="btn insert-small" type="button" onclick="insert_text_after( ${newId} )">+ Текстовая ячейка</button>
          <button class="btn insert-small" type="button" onclick="insert_model_after( ${newId} )">+ Модельная ячейка</button>
        </div>
      </div>
      `;

      current.insertAdjacentHTML('afterend', html);
      syncCells();
    }
    function insert_model_after(after) {
      const current = document.getElementById(`insert-zone-${after}`);
      const newId = maxId + inc;
      inc += 1;

      const html = `
      <article class="cell" id="cell-${newId}" data-type="MODEL">
        <div class="cell-header">
          <span class="cell-type"><span class="marker"></span> Модельная ячейка</span>
          <div class="cell-actions">
            <button class="btn cell-btn" type="button">Скрыть</button>
            <button class="btn cell-btn danger" type="button">Удалить</button>
          </div>
        </div>

        <div class="model-cell">
          <a class="model-link" href="/model">Открыть UI работы с моделью</a>
          <div class="empty-note">Метрики не добавлены</div>
        </div>
      </article>

      <div class="insert-zone" id="insert-zone-${newId}">
        <div class="insert-actions">
          <button class="btn insert-small" type="button" onclick="insert_text_after( ${newId} )">+ Текстовая ячейка</button>
          <button class="btn insert-small" type="button" onclick="insert_model_after( ${newId} )">+ Модельная ячейка</button>
        </div>
      </div>
      `;

      current.insertAdjacentHTML('afterend', html);
      syncCells();
    }

    function collectCells() {
      const articles = document.querySelectorAll('article.cell');

      const result = [];

      articles.forEach((article, index) => {
        let type;
        let stext = null;

        type = article.dataset.type;

        if (type === "TEXT") {
          const content = article.querySelector('.cell-content');
          stext = content ? content.innerText.trim() : "";
        }

        result.push({
          id: parseInt(article.id.replace('cell-', '')),
          pos: index,
          type: type,
          stext: stext
        });
      });

      console.log(result);

      return result;
    }

    async function syncCells() {
      const data = collectCells();

      await fetch('/project/{{ experiment.project_id }}/experiment/{{ experiment.id }}/sync', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(data),
      });
    }
  </script>
</body>
</html>
